[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# set to 'true' to run the environment during
# "alembic revision" command.
revision_environment = true

# timezone to use when rendering the date in the migration file
# default is None, which will use UTC.
timezone = UTC

# max length of the generated migration file name (default: 40)
max_length = 40

# version table name
version_table = alembic_version

# version table schema
version_table_schema = public

# include a "downgrade" function in migration files
include_downgrade = false

# include an "upgrade" function in migration files
include_upgrade = true

# include a "run_before" function in migration files
include_run_before = false

# include a "run_after" function in migration files
include_run_after = false

# set to 'true' to enable auto-generate revision IDs
autogenerate_revision_id = true

# set to 'true' to enable auto-generate revision IDs with a random prefix
autogenerate_revision_id_random_prefix = false

# set to 'true' to enable auto-generate revision IDs with a timestamp prefix
autogenerate_revision_id_timestamp_prefix = false

# set to 'true' to enable auto-generate revision IDs with a UUID prefix
autogenerate_revision_id_uuid_prefix = false

# set to 'true' to enable auto-generate revision IDs with a hash prefix
autogenerate_revision_id_hash_prefix = false

# set to 'true' to enable auto-generate revision IDs with a counter prefix
autogenerate_revision_id_counter_prefix = false

# set to 'true' to enable auto-generate revision IDs with a random suffix
autogenerate_revision_id_random_suffix = false

# set to 'true' to enable auto-generate revision IDs with a timestamp suffix
autogenerate_revision_id_timestamp_suffix = false

# set to 'true' to enable auto-generate revision IDs with a UUID suffix
autogenerate_revision_id_uuid_suffix = false

# set to 'true' to enable auto-generate revision IDs with a hash suffix
autogenerate_revision_id_hash_suffix = false

# set to 'true' to enable auto-generate revision IDs with a counter suffix
autogenerate_revision_id_counter_suffix = false

# set to 'true' to enable auto-generate revision IDs with a random prefix and suffix
