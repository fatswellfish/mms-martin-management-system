<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>{% block title %}fieldops{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        .topbar {background:#2c3e50;color:white;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;font-size:15px;}
        .topbar-title {font-size:18px;font-weight:bold;color:#ecf0f1;}
        .topbar-nav a {color:#ecf0f1;text-decoration:none;margin:0 10px;padding:4px 6px;border-radius:4px;display:inline-block;font-size:14px;}
        .topbar-nav a:hover {background-color:#34495e;}
        .page-container {padding:20px;}

        /* Dashboard 样式（来自你的 index.html） */
        .qms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }
        .qms-block {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 8px 10px;
            font-size: 13px;
            background-color: #fafafa;
        }
        .qms-block h4 {
            margin: 0 0 4px 0;
            font-size: 14px;
        }
        .qms-block .qms-desc {
            color: #605e5c;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .qms-block ul {
            margin: 4px 0 0 18px;
            padding: 0;
        }
        .qms-block li {
            margin: 2px 0;
        }
        .text-muted {
            color: #605e5c;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-title">fieldops</div>
        <div class="topbar-nav">
            <a href="/fieldops">首页</a>
            <a href="/fieldops/tree">农场结构</a>
            <a href="/fieldops/batch-detail">批次管理</a>
            <a href="/fieldops/event-trace">事件轨迹</a>
            <a href="/fieldops/inbound-wizard">向导</a>
        </div>
    </div>

    <div class="page-container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
