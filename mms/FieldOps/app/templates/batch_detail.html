{% extends "base_field_ops.html" %}

{% block title %}fieldops - 批次详情{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-xl font-semibold text-gray-800 mb-4">批次详情</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <!-- 基本信息 -->
        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
            <h3 class="font-medium text-blue-800 mb-3">基本信息</h3>
            <div class="space-y-2 text-sm">
                <div><span class="font-medium">批次编号:</span> <span id="batch-code">-</span></div>
                <div><span class="font-medium">初始数量:</span> <span id="initial-quantity">-</span></div>
                <div><span class="font-medium">当前存活:</span> <span id="current-alive">-</span></div>
                <div><span class="font-medium">累计死亡:</span> <span id="total-dead">-</span></div>
                <div><span class="font-medium">累计出栏:</span> <span id="total-sold">-</span></div>
                <div><span class="font-medium">状态:</span> <span id="batch-status">-</span></div>
            </div>
        </div>
        
        <!-- 事件追踪 -->
        <div class="bg-green-50 border border-green-200 rounded-lg p-4">
            <h3 class="font-medium text-green-800 mb-3">事件轨迹</h3>
            <div id="event-trace-container" hx-get="/api/events?batch_id={{ batch_id }}" hx-trigger="load" hx-swap="innerHTML" hx-target="#event-trace-container" class="space-y-2 max-h-48 overflow-y-auto">
                <p class="text-xs text-gray-500">正在加载事件...</p>
            </div>
        </div>
    </div>
    
    <!-- 转栏记录 -->
    <div class="bg-white border border-gray-200 rounded-lg p-4 mb-6">
        <h3 class="font-medium text-gray-800 mb-3">转栏历史</h3>
        <div id="transfer-history" hx-get="/api/events?event_type=transfer&batch_id={{ batch_id }}" hx-trigger="load" hx-swap="innerHTML" hx-target="#transfer-history" class="space-y-2 max-h-48 overflow-y-auto">
            <p class="text-xs text-gray-500">正在加载转栏记录...</p>
        </div>
    </div>
    
    <!-- 按栏分布图 -->
    <div class="bg-white border border-gray-200 rounded-lg p-4">
        <h3 class="font-medium text-gray-800 mb-3">按栏分布</h3>
        <div id="batch-location-chart" hx-get="/api/tree?batch_id={{ batch_id }}" hx-trigger="load" hx-swap="innerHTML" hx-target="#batch-location-chart" class="space-y-2 max-h-64 overflow-y-auto">
            <p class="text-xs text-gray-500">正在加载分布图...</p>
        </div>
    </div>
</div>

<!-- 动态脚本：更新详情数据 -->
<script>
    document.addEventListener("htmx:afterSwap", function(evt) {
        if (evt.detail.target.id === "event-trace-container") {
            const events = evt.detail.xhr.response;
            if (events && events.length > 0) {
                const container = document.getElementById("event-trace-container");
                container.innerHTML = '';
                
                events.forEach(event => {
                    const item = document.createElement("div");
                    item.className = "flex items-center gap-2 text-xs py-1 px-2 rounded bg-gray-100 text-gray-700";
                    item.textContent = `[${event.timestamp}] ${event.message}`;
                    container.appendChild(item);
                });
            } else {
                document.getElementById("event-trace-container").innerHTML = '<p class="text-xs text-gray-500">暂无事件记录。</p>';
            }
        }
        
        if (evt.detail.target.id === "transfer-history") {
            const events = evt.detail.xhr.response;
            if (events && events.length > 0) {
                const container = document.getElementById("transfer-history");
                container.innerHTML = '';
                
                events.forEach(event => {
                    const item = document.createElement("div");
                    item.className = "flex items-center gap-2 text-xs py-1 px-2 rounded bg-blue-100 text-blue-700";
                    item.textContent = `[${event.timestamp}] 转至 ${event.barn_name} ${event.pen_name}`;
                    container.appendChild(item);
                });
            } else {
                document.getElementById("transfer-history").innerHTML = '<p class="text-xs text-gray-500">暂无转栏记录。</p>';
            }
        }
        
        if (evt.detail.target.id === "batch-location-chart") {
            const data = evt.detail.xhr.response;
            if (data && data.tree) {
                const container = document.getElementById("batch-location-chart");
                container.innerHTML = '';
                
                data.tree.forEach(category => {
                    const categoryDiv = document.createElement("div");
                    categoryDiv.className = "border-l-2 border-gray-300 pl-4 mb-2";
                    
                    const header = document.createElement("div");
                    header.className = "font-medium text-gray-700 text-sm mb-1";
                    header.textContent = `${category.name} (${category.barns.length} 舍)`;
                    
                    const barnList = document.createElement("div");
                    barnList.className = "space-y-1";
                    
                    category.barns.forEach(barn => {
                        const barnDiv = document.createElement("div");
                        barnDiv.className = "text-xs text-gray-600 flex justify-between items-center";
                        
                        const barnName = document.createElement("span");
                        barnName.textContent = barn.name;
                        
                        const penCount = document.createElement("span");
                        penCount.className = "bg-gray-200 text-gray-700 px-2 py-0.5 rounded text-xs";
                        penCount.textContent = `栏数: ${barn.pens.length}`;
                        
                        barnDiv.appendChild(barnName);
                        barnDiv.appendChild(penCount);
                        barnList.appendChild(barnDiv);
                    });
                    
                    categoryDiv.appendChild(header);
                    categoryDiv.appendChild(barnList);
                    container.appendChild(categoryDiv);
                });
            } else {
                document.getElementById("batch-location-chart").innerHTML = '<p class="text-xs text-gray-500">暂无分布数据。</p>';
            }
        }
    });
</script>
{% endblock %}
