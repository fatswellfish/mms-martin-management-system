{% extends "base_field_ops.html" %}

{% block title %}FieldOps - 事件流{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-xl font-semibold text-gray-800 mb-4">事件历史记录</h2>
    
    <div class="mb-4 flex justify-between items-center">
        <div class="flex space-x-2">
            <button onclick="refreshCard('event-list-container')" class="px-3 py-1 bg-gray-200 hover:bg-gray-300 rounded text-sm transition">
                刷新
            </button>
            <button onclick="window.location.href='/api/events?limit=50'" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm transition">
                详情页（50条）
            </button>
        </div>
        <span class="text-sm text-gray-500">共 {{ total_events }} 条事件</span>
    </div>
    
    <div id="event-list-container" hx-get="/api/events?limit=10" hx-trigger="load" hx-swap="innerHTML" hx-target="#event-list-container" class="space-y-2">
        <p class="text-sm text-gray-500">正在加载事件...</p>
    </div>
</div>

<!-- 动态脚本：渲染事件列表 -->
<script>
    document.addEventListener("htmx:afterSwap", function(evt) {
        if (evt.detail.target.id === "event-list-container") {
            const events = evt.detail.xhr.response;
            if (events && events.length > 0) {
                const container = document.getElementById("event-list-container");
                container.innerHTML = '';
                
                events.forEach(event => {
                    const item = document.createElement("div");
                    item.className = "flex items-start gap-3 p-3 border-b border-gray-100 hover:bg-gray-50 transition"
                    
                    // 事件颜色标记块
                    const colorBlock = document.createElement("div");
                    colorBlock.className = "w-3 h-3 rounded-full";
                    colorBlock.style.backgroundColor = event.color;
                    
                    // 事件内容
                    const content = document.createElement("div");
                    content.className = "flex-1 min-w-0";
                    
                    const header = document.createElement("div");
                    header.className = "flex justify-between items-center mb-1";
                    
                    const title = document.createElement("span");
                    title.className = "font-medium text-gray-800";
                    title.textContent = `[${event.level}] ${event.event_type}`;
                    
                    const time = document.createElement("span");
                    time.className = "text-xs text-gray-500";
                    time.textContent = event.timestamp;
                    
                    header.appendChild(title);
                    header.appendChild(time);
                    
                    const body = document.createElement("div");
                    body.className = "text-sm text-gray-700";
                    body.textContent = event.message;
                    
                    if (event.quantity) {
                        const quantity = document.createElement("div");
                        quantity.className = "text-xs text-gray-500 mt-1";
                        quantity.textContent = `数量: ${event.quantity}`;
                        body.appendChild(quantity);
                    }
                    
                    if (event.actor) {
                        const actor = document.createElement("div");
                        actor.className = "text-xs text-gray-500 mt-1";
                        actor.textContent = `操作人: ${event.actor}`;
                        body.appendChild(actor);
                    }
                    
                    content.appendChild(header);
                    content.appendChild(body);
                    
                    item.appendChild(colorBlock);
                    item.appendChild(content);
                    
                    container.appendChild(item);
                });
                
                // 更新总数显示（如果需要）
                const totalEl = document.querySelector(".text-gray-500");
                if (totalEl) {
                    totalEl.textContent = `共 ${events.length} 条事件`;
                }
            } else {
                document.getElementById("event-list-container").innerHTML = '<p class="text-sm text-gray-500">暂无事件记录。</p>';
            }
        }
    });
</script>
{% endblock %}
