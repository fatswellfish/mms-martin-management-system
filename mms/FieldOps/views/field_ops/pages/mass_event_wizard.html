{% extends "field_ops/base_field_ops.html" %}

{% block fieldops_content %}

<h3><b>批处理事件向导（Mass Event）</b></h3>
<p class="text-muted">A9 · 多栏批处理事件（疫苗/检测/驱虫等）</p>

<div class="fo-card">
    <form hx-post="/pig-farm/api/mass-event/process"
          hx-target="#wizard-result">

        <label>事件类型：</label>
        <select name="event_type" class="form-control">
            <option value="VACCINE">疫苗</option>
            <option value="TEST">检测</option>
            <option value="TREATMENT">治疗</option>
        </select>

        <label>日期：</label>
        <input name="date" type="date" class="form-control">

        <label>备注：</label>
        <input name="remark" type="text" class="form-control">

        <label>栏位 JSON：</label>
        <textarea name="pen_quantities" class="form-control"
                  placeholder='例如 {"12":150, "15":80}'></textarea>

        <button class="btn btn-primary" style="margin-top:10px;">提交</button>
    </form>
</div>

<div id="wizard-result"></div>

{% endblock %}
