{% extends "field_ops/base_field_ops.html" %}
{% from "field_ops/components/barn_card.html" import barn_card %}
{% block fieldops_content %}

<h3><b>{{ category.name }}（{{ category.code }}）</b></h3>
<p class="text-muted">A2 · 类别视图</p>

<div class="qms-grid">
    {% for barn in barns %}
        <div class="fo-card" style="cursor:pointer"
             hx-get="/pig-farm/barn/{{ barn.id }}"
             hx-target="#main-panel"
             hx-push-url="true">
            <h5>{{ barn.name }}</h5>
            <small class="text-muted">{{ barn.barn_number }} 号舍</small>
        </div>
    {% endfor %}
</div>

{% endblock %}
