# mms/FieldOps/migrations/alembic.ini
# FieldOps 项目 - Alembic 配置文件（已完成）

# 1. 配置 Alembic 运行环境（用于数据库迁移管理）
[alembic]
# 2. 位置：迁移脚本的根目录（相对路径）
script_location = migrations

# 3. 位置：数据库连接字符串（与 database.py 一致）
# 4. 用于生成迁移文件时的默认连接字符串（开发环境）
# 5. 用于运行迁移命令时的连接字符串（生产环境需修改）
sqlalchemy.url = sqlite:///./data/fieldops.db

# 6. 位置：用于在生成迁移文件时，从模型中提取元数据的 Python 模块路径（必须存在）
# 7. 用于运行迁移命令时，加载数据库模型的模块路径（必须存在）
# 8. 用于初始化数据库表结构的模块路径（与 main.py 一致）
# 9. 位置：迁移脚本的命名模板（可自定义）
file_template = %%(rev)s_%%(slug)s

