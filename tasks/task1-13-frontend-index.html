<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldOps - 现场管理系统</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/js/app.js" defer></script>
</head>
<body class="bg-gray-900 text-white">
    <header class="bg-gray-800 border-b border-gray-700 py-4 px-6 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <svg class="w-8 h-8 text-green-400" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
            <h1 class="text-2xl font-bold">FieldOps</h1>
        </div>
        <div class="text-sm text-gray-400">
            现场管理系统 | 2026年3月4日
        </div>
    </header>

    <main class="container mx-auto px-6 py-8">
        <!-- 农场结构卡片 -->
        <section id="farm-tree" class="mb-10">
            <h2 class="text-xl font-semibold mb-4 text-green-400">农场结构图</h2>
            <div id="farm-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 动态生成的农场卡片将插入此处 -->
            </div>
        </section>

        <!-- 批次信息卡片 -->
        <section id="batches" class="mb-10">
            <h2 class="text-xl font-semibold mb-4 text-blue-400">当前批次</h2>
            <div id="batches-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 动态生成的批次卡片将插入此处 -->
            </div>
        </section>

        <!-- 事件流滚动条 -->
        <section id="events" class="mb-10">
            <h2 class="text-xl font-semibold mb-4 text-purple-400">系统事件流</h2>
            <div id="events-scroll" class="bg-gray-800 rounded-lg p-4 h-48 overflow-y-auto border border-gray-600">
                <!-- 动态生成的事件记录将插入此处 -->
            </div>
        </section>

        <!-- 指令控制区 -->
        <section id="controls" class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h2 class="text-xl font-semibold mb-4 text-yellow-400">操作指令</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="batchId" class="block text-sm font-medium mb-1">批次编号</label>
                    <input type="text" id="batchId" placeholder="BATCH-2025-04-05-001" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label for="distributionMap" class="block text-sm font-medium mb-1">分配方案（格式：{"pen_id": 300}）</label>
                    <input type="text" id="distributionMap" placeholder="{\"pen_1\": 300, \"pen_2\": 300}" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
            </div>
            <div class="mt-4 flex space-x-3">
                <button id="distributeBtn" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-medium transition-colors">
                    🔄 分配批次
                </button>
                <button id="createEventBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-medium transition-colors">
                    ✏️ 记录事件
                </button>
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 border-t border-gray-700 py-4 px-6 text-center text-sm text-gray-500">
        &copy; 2026 FieldOps 系统 | 工业级现场管理平台 | 由 OpenClaw 生成
    </footer>
</body>
</html>
