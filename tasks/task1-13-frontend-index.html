<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldOps - 现场管理系统</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="/static/js/app.js" defer></script>
</head>
<body>
    <header>
        <h1>🏭 FieldOps 现场管理系统</h1>
        <p class="subtitle">实时监控 | 智能调度 | 数据可视化</p>
    </header>

    <main>
        <!-- 农场结构树 -->
        <section class="card">
            <h2>🌳 农场结构树</h2>
            <div id="farm-tree-container" class="tree-container">
                <p class="loading">加载中...</p>
            </div>
        </section>

        <!-- 最近事件流 -->
        <section class="card">
            <h2>🔔 近期事件</h2>
            <div id="events-container" class="events-container">
                <p class="loading">加载中...</p>
            </div>
        </section>

        <!-- 批次列表 -->
        <section class="card">
            <h2>📊 当前批次</h2>
            <div id="batches-container" class="batches-container">
                <p class="loading">加载中...</p>
            </div>
        </section>

        <!-- 分栏控制面板（可选） -->
        <section class="card">
            <h2>🧩 分栏管理</h2>
            <div id="distribution-panel" class="distribution-panel">
                <input type="text" id="batch-id-input" placeholder="输入批次号 (如: B20241201-001)">
                <button id="distribute-btn">分栏</button>
                <div id="distribution-result"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 FieldOps 系统 | 版本: 1.0.0 | 项目进度：已完成阶段二与三的 60%</p>
    </footer>
</body>
</html>
